name: Deploy to Github Pages

on:
  push:
    branches: [ main ]  # Triggered whenever a push is made to the main branch or via API

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.ks
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy static bundle to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
            folder: dist
            branch: gh-pages